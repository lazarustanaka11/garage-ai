{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-header">

                <h3>Create Account</h3>

            </div>

            <div class="card-body">

                <form id="register-form">

                    <div class="mb-3">

                        <label class="form-label">
                            Full Name
                        </label>

                        <input
                            id="full_name"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Email
                        </label>

                        <input
                            id="email"
                            type="email"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Password
                        </label>

                        <input
                            id="password"
                            type="password"
                            class="form-control"
                            required>

                    </div>

                    <button
                        class="btn btn-success w-100">

                        Register

                    </button>

                </form>

                <hr>

                <p class="text-center">

                    Already have an account?

                    <a href="/login">

                        Login

                    </a>

                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}

{% block scripts %}

<script src="{{ url_for('static', path='js/register.js') }}"></script>

{% endblock %}
