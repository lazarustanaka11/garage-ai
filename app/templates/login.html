{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-4">

        <div class="card shadow">

            <div class="card-body">

                <h2 class="mb-4 text-center">

                    Login

                </h2>

                <form id="login-form">

                    <div class="mb-3">

                        <label class="form-label">

                            Username

                        </label>

                        <input
                            id="username"
                            class="form-control"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Password

                        </label>

                        <input
                            id="password"
                            type="password"
                            class="form-control"
                            required
                        >

                    </div>

                    <button
                        class="btn btn-dark w-100">

                        Login

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}

{% block scripts %}

<script src="{{ url_for('static', path='js/login.js') }}"></script>

{% endblock %}
