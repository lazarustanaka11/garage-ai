<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | Garage AI</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="{{ url_for('static', path='css/style.css') }}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            🚗 Garage AI
        </a>

        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbar">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="navbar">

            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/">
                        Dashboard
                    </a>
                </li>

                <li class="nav-item auth-only d-none">
                    <a class="nav-link" href="/customers">
                        Customers
                    </a>
                </li>

                <li class="nav-item auth-only d-none">
                    <a class="nav-link" href="/vehicles">
                        Vehicles
                    </a>
                </li>

                <li class="nav-item auth-only d-none">
                    <a class="nav-link" href="/repair-jobs">
                        Repair Jobs
                    </a>
                </li>

            </ul>

            <div class="d-flex gap-2">

                <a
                    id="register-btn"
                    href="/register"
                    class="btn btn-outline-success">
                    Register
                </a>

                <a
                    id="login-btn"
                    href="/login"
                    class="btn btn-outline-light">
                    Login
                </a>

                <button
                    id="logout-btn"
                    class="btn btn-danger d-none">
                    Logout
                </button>

            </div>

        </div>

    </div>

</nav>

<div class="container mt-4">

    <div id="alert-container"></div>

    {% block content %}
    {% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="{{ url_for('static', path='js/api.js') }}"></script>

<script src="{{ url_for('static', path='js/ui.js') }}"></script>

<script>

function updateNavbar() {

    const token = localStorage.getItem("access_token");

    const loginBtn = document.getElementById("login-btn");

    const registerBtn = document.getElementById("register-btn");

    const logoutBtn = document.getElementById("logout-btn");

    const authLinks = document.querySelectorAll(".auth-only");

    if (token) {

        loginBtn.classList.add("d-none");

        registerBtn.classList.add("d-none");

        logoutBtn.classList.remove("d-none");

        authLinks.forEach(link => link.classList.remove("d-none"));

    }

    else {

        loginBtn.classList.remove("d-none");

        registerBtn.classList.remove("d-none");

        logoutBtn.classList.add("d-none");

        authLinks.forEach(link => link.classList.add("d-none"));

    }

}

document.addEventListener("DOMContentLoaded", () => {

    updateNavbar();

    const logoutBtn = document.getElementById("logout-btn");

    logoutBtn.addEventListener("click", () => {

        localStorage.removeItem("access_token");

        window.location.href = "/login";

    });

});

</script>

{% block scripts %}
{% endblock %}

</body>
</html>
